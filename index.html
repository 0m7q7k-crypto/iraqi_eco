<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>مرحباً بك في عراقي إيكو</h1>
    <div id="species-list">جاري تحميل البيانات...</div>

    <script>
        // إعدادات الاتصال بمشروعك الجديد
        const SUPABASE_URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // وظيفة لجلب البيانات من جدول species
        async function fetchSpecies() {
            const { data, error } = await supabase
                .from('species')
                .select('*');

            if (error) {
                document.getElementById('species-list').innerText = 'خطأ في جلب البيانات: ' + error.message;
                return;
            }

            const listDiv = document.getElementById('species-list');
            listDiv.innerHTML = ''; // تفريغ التحميل

            if (data.length === 0) {
                listDiv.innerText = 'لا توجد بيانات حالياً.';
                return;
            }

            data.forEach(item => {
                listDiv.innerHTML += `
                    <div>
                        <h2>${item.name_ar}</h2>
                        <p>الاسم العلمي: ${item.scientific_name}</p>
                        <p>حالة الحفظ: ${item.conservation_status}</p>
                    </div>
                    <hr>
                `;
            });
        }

        // تشغيل الوظيفة عند فتح الصفحة
        fetchSpecies();
    </script>
</body>
</html>
