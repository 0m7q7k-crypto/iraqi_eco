<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص نهائي - عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>حالة الاتصال:</h1>
    <div id="status">جاري المحاولة...</div>

    <script>
        const statusDiv = document.getElementById('status');
        
        // 1. تعريف العميل
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX'
        );

        // 2. محاولة جلب البيانات مع مراقبة الأخطاء
        async function testConnection() {
            try {
                console.log("بدء طلب البيانات...");
                const { data, error } = await supabase.from('species').select('*').range(0, 5);
                
                if (error) {
                    statusDiv.innerHTML = "<b style='color:red;'>خطأ في القاعدة:</b> " + error.message;
                    console.error("Supabase Error Details:", error);
                } else {
                    statusDiv.innerHTML = "<b style='color:green;'>نجاح!</b> عدد البيانات التي وصلت: " + data.length;
                    console.log("Data:", data);
                }
            } catch (err) {
                statusDiv.innerHTML = "<b style='color:red;'>خطأ في المتصفح/الشبكة:</b> " + err.message;
                console.error("Catch Error:", err);
            }
        }

        testConnection();
    </script>
</body>
</html>
