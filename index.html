<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كاشف الأعطال</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>نتائج الفحص:</h1>
    <div id="debug" style="background:#eee; padding:10px; border:1px solid #999;"></div>

    <script>
        const debug = document.getElementById('debug');
        debug.innerText = "بدء الاتصال...";

        try {
            const supabase = window.supabase.createClient(
                'https://rmqtopxawrrgntcqqnpa.supabase.co', 
                'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX'
            );

            debug.innerText += "\nتم إنشاء العميل. جاري الطلب...";

            supabase.from('species').select('*').then(res => {
                if (res.error) {
                    debug.innerText = "خطأ في القاعدة: " + res.error.message;
                } else {
                    debug.innerText = "نجاح! وصلت " + res.data.length + " قطعة بيانات.";
                }
            }).catch(err => {
                debug.innerText = "خطأ في الشبكة: " + err.message;
            });
        } catch (e) {
            debug.innerText = "خطأ في الكود: " + e.message;
        }
    </script>
</body>
</html>
