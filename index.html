<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; color: #333; }
        h1 { text-align: center; color: #2e7d32; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 5px solid #2e7d32; }
        
        /* تصميم لوحة التحكم */
        #admin-panel { max-width: 500px; margin: 40px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #1b5e20; }
        
        /* إخفاء لوحة الإدارة */
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <h1>قائمة الكائنات الحية</h1>
    <div id="list">جاري تحميل البيانات...</div>

    <div style="text-align: center; margin-top: 50px;">
        <button onclick="document.getElementById('admin-panel').style.display='block'" style="background:none; color:#777; border:none; text-decoration:underline;">تسجيل دخول الإدارة</button>
    </div>

    <div id="admin-panel">
        <div id="login-area">
            <h3>تسجيل دخول المشرف</h3>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة السر">
            <button onclick="login()">دخول</button>
        </div>
        <div id="publish-area" style="display:none;">
            <h3>إضافة كائن جديد</h3>
            <input type="text" id="name" placeholder="اسم الكائن">
            <button onclick="publish()">نشر الكائن</button>
            <button onclick="logout()">خروج</button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA'
        );

        async function loadData() {
            const { data } = await supabase.from('species').select('*');
            document.getElementById('list').innerHTML = data.map(i => `
                <div class="card">
                    <h2>${i.name_ar}</h2>
                </div>
            `).join('');
        }

        async function login() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert("خطأ: " + error.message);
            else location.reload();
        }

        async function publish() {
            const { error } = await supabase.from('species').insert([{ name_ar: document.getElementById('name').value }]);
            if (error) alert("خطأ: " + error.message);
            else { alert("تم النشر!"); location.reload(); }
        }

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        window.addEventListener('load', async () => {
            loadData();
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('publish-area').style.display = 'block';
            }
        });
    </script>
</body>
</html>
