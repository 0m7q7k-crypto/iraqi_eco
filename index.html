<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #f9f9f9; }
        .admin-section { margin-top: 40px; padding: 20px; border: 2px dashed #ccc; border-radius: 10px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>قائمة الكائنات الحية</h1>
    <div id="list">جاري تحميل البيانات...</div>

    <div id="admin-section" class="admin-section">
        <div id="login-area">
            <h3>تسجيل دخول المشرف للنشر:</h3>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة السر">
            <button onclick="login()">دخول للنشر</button>
        </div>

        <div id="publish-area" style="display:none;">
            <h3>إضافة كائن جديد:</h3>
            <input type="text" id="name" placeholder="اسم الكائن">
            <button onclick="publish()">نشر الكائن</button>
            <button onclick="logout()">خروج من لوحة التحكم</button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA'
        );

        // تحميل البيانات للجميع
        async function loadData() {
            const { data, error } = await supabase.from('species').select('*');
            if (error) {
                document.getElementById('list').innerText = "خطأ في تحميل البيانات.";
            } else {
                document.getElementById('list').innerHTML = data.map(i => `
                    <div class="card">
                        <h2>${i.name_ar || 'بدون اسم'}</h2>
                    </div>
                `).join('');
            }
        }

        // تسجيل الدخول
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("خطأ في تسجيل الدخول: " + error.message);
            } else {
                location.reload();
            }
        }

        // النشر
        async function publish() {
            const name = document.getElementById('name').value;
            const { error } = await supabase.from('species').insert([{ name_ar: name }]);
            if (error) {
                alert("خطأ في النشر: " + error.message);
            } else {
                alert("تم النشر بنجاح!");
                location.reload();
            }
        }

        // تسجيل الخروج
        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // التحقق من الحالة عند التشغيل
        window.addEventListener('load', async () => {
            loadData();
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('publish-area').style.display = 'block';
            }
        });
    </script>
</body>
</html>
