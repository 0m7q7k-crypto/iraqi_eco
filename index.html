<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    </head>
<body>
    <div id="dataGrid">جاري تحميل البيانات...</div>

    <script>
        async function init() {
            try {
                // هذا السطر هو مفتاح الحل، هو الذي يقرأ ملف data.json
                const response = await fetch('data.json');
                const database = await response.json();
                
                const grid = document.getElementById('dataGrid');
                grid.innerHTML = database.map(item => `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <p class="desc">${item.desc || 'لا يوجد وصف'}</p>
                        <div class="status ${item.class}">${item.status}</div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('dataGrid').innerHTML = "خطأ: تأكد من ملف JSON.";
            }
        }
        init();
    </script>
</body>
</html>
