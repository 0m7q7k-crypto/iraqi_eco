<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>قائمة الكائنات</h1>
    <div id="output">جاري التحميل...</div>

    <script>
        // نستخدم supabase مباشرة (بدون window.)
        // تأكد من استخدام المفتاح الصحيح الذي نسخته
        const supabaseUrl = 'https://rmqtopxawrrgntcqqnpa.supabase.co';
        const supabaseKey = 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX';
        
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadData() {
            try {
                const { data, error } = await client.from('species').select('*');
                
                if (error) {
                    document.getElementById('output').innerText = "خطأ: " + error.message;
                } else {
                    document.getElementById('output').innerHTML = data.map(item => `
                        <div style="border:1px solid #ccc; padding:10px; margin:5px;">
                            <h3>${item.name_ar}</h3>
                            <p>${item.scientific_name}</p>
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('output').innerText = "حدث خطأ: " + err.message;
            }
        }

        loadData();
    </script>
</body>
</html>
