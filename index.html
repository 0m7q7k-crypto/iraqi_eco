<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f9f9f9; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-right: 5px solid #2e7d32; }
        .admin-section { margin-top: 50px; padding: 20px; border-top: 2px solid #ccc; text-align: center; }
        #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; max-width: 300px; margin: 10px auto; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #2e7d32; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>قائمة الكائنات الحية</h1>
    <div id="list">جاري تحميل البيانات...</div>

    <div class="admin-section">
        <button id="toggle-admin" onclick="showAdmin()">تسجيل دخول الإدارة</button>
        
        <div id="admin-panel">
            <div id="login-area">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <input type="password" id="password" placeholder="كلمة السر">
                <button onclick="login()">دخول</button>
            </div>
            <div id="publish-area" style="display:none;">
                <h3>إضافة كائن جديد</h3>
                <input type="text" id="name" placeholder="اسم الكائن">
                <button onclick="publish()">نشر</button>
                <button onclick="logout()">خروج</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA'
        );

        async function loadData() {
            const { data, error } = await supabase.from('species').select('*');
            if (error) {
                document.getElementById('list').innerText = "خطأ في الاتصال بقاعدة البيانات.";
            } else {
                document.getElementById('list').innerHTML = data.map(i => `
                    <div class="card">
                        <h2>${i.name_ar || 'كائن بدون اسم'}</h2>
                    </div>
                `).join('');
            }
        }

        function showAdmin() {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('toggle-admin').style.display = 'none';
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("خطأ: " + error.message);
            } else {
                alert("تم الدخول بنجاح!");
                location.reload();
            }
        }

        async function publish() {
            const name = document.getElementById('name').value;
            const { error } = await supabase.from('species').insert([{ name_ar: name }]);
            if (error) alert("خطأ: " + error.message);
            else { alert("تم النشر!"); location.reload(); }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        window.addEventListener('load', async () => {
            loadData();
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                showAdmin();
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('publish-area').style.display = 'block';
            }
        });
    </script>
</body>
</html>
