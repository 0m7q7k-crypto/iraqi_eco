<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; zoom: 1.5; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .kingdom-section { margin-bottom: 30px; }
        .kingdom-title { background: #1b5e20; color: white; padding: 5px 15px; border-radius: 5px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        .cards-wrapper { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; width: 220px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu-btn { position: absolute; top: 5px; left: 5px; cursor: pointer; font-weight: bold; }
        .menu-options { display: none; position: absolute; top: 25px; left: 5px; background: white; border: 1px solid #ccc; z-index: 10; padding: 5px; }
        .menu-options div { padding: 5px; cursor: pointer; font-size: 0.8em; }
        input, select { display: block; width: 90%; margin: 5px 0; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 10%; right: 10%; width: 80%; background: white; padding: 20px; border: 3px solid #1b5e20; z-index: 100; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <input type="text" id="search" placeholder="بحث بالاسم..." onkeyup="render()" style="width:100%; padding:10px;">
    <button onclick="document.getElementById('modal').style.display='block'" style="margin:10px 0; padding:10px; background:#1b5e20; color:white; border:none; border-radius:5px;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <h3>إضافة مخلوق جديد</h3>
    <input id="n_ar" placeholder="الاسم العربي">
    <input id="n_sci" placeholder="الاسم العلمي">
    <input id="kingdom" placeholder="المملكة">
    <input id="phylum" placeholder="الشعبة">
    <input id="family" placeholder="العائلة">
    <select id="conservation_status">
        <option value="LC">غير مهدد (LC)</option>
        <option value="EN">مهدد (EN)</option>
        <option value="CR">خطر أقصى (CR)</option>
    </select>
    <button onclick="addItem()" style="background:#1b5e20; color:white; padding:10px; width:100%;">حفظ</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];

    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        const kingdoms = [...new Set(species.map(i => i.kingdom || 'غير مصنف'))];
        document.getElementById('content').innerHTML = kingdoms.map(k => `
            <div class="kingdom-section">
                <div class="kingdom-title">${k}</div>
                <div class="cards-wrapper">
                    ${species.filter(i => (i.kingdom||'غير مصنف') === k && (i.name_ar||'').includes(q)).map(item => `
                        <div class="card" id="card-${item.id}">
                            <div class="menu-btn" onclick="this.nextElementSibling.style.display='block'">⋮</div>
                            <div class="menu-options" onmouseleave="this.style.display='none'">
                                <div onclick="deleteItem(${item.id})">حذف</div>
                                <div onclick="downloadCard('card-${item.id}')">تنزيل</div>
                            </div>
                            <h3>${item.name_ar}</h3>
                            <p><i>${item.scientific_name}</i></p>
                            <small>العائلة: ${item.family || 'غير معروف'}</small>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    async function addItem() {
        const data = {
            name_ar: document.getElementById('n_ar').value,
            scientific_name: document.getElementById('n_sci').value,
            kingdom: document.getElementById('kingdom').value,
            phylum: document.getElementById('phylum').value,
            family: document.getElementById('family').value,
            conservation_status: document.getElementById('conservation_status').value
        };
        await client.from('species').insert([data]);
        location.reload();
    }

    async function deleteItem(id) {
        await client.from('species').delete().eq('id', id);
        location.reload();
    }

    function downloadCard(id) {
        html2canvas(document.getElementById(id)).then(canvas => {
            const link = document.createElement('a');
            link.download = 'creature.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
    init();
</script>
</body>
</html>
