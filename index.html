<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .header { text-align: center; color: #2e7d32; }
        
        /* تصميم البطاقة */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0 5px; }
        .card p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h1 class="header">☘️ عراقي إيكو</h1>
    
    <div id="displayArea" class="grid"></div>

    <script>
        const URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co/rest/v1/species?select=*';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA';

        async function loadSpecies() {
            const response = await fetch(URL, {
                headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
            });
            const data = await response.json();
            
            const area = document.getElementById('displayArea');
            area.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.image_url || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                    <h3>${item.arabic_name || 'كائن غير مسمى'}</h3>
                    <p><em>${item.latin_name || 'لا يوجد اسم لاتيني'}</em></p>
                    <p style="color:#2e7d32; font-weight:bold;">${item.category || 'غير مصنف'}</p>
                </div>
            `).join('');
        }

        loadSpecies();
    </script>
</body>
</html>
