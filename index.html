<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .section { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-section" class="section">
        <h3>تسجيل دخول المشرف</h3>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
    </div>

    <div id="publish-section" class="section" style="display:none;">
        <h3>إضافة كائن جديد</h3>
        <input type="text" id="name" placeholder="اسم الكائن">
        <button onclick="publish()">نشر</button>
        <button onclick="logout()">خروج</button>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA'
        );

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.querySelector('button[onclick="login()"]');
            
            loginBtn.innerText = "جاري الاتصال...";

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("خطأ: " + error.message);
                loginBtn.innerText = "دخول";
            } else {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('publish-section').style.display = 'block';
                alert("تم الدخول بنجاح!");
            }
        }

        async function publish() {
            const name = document.getElementById('name').value;
            const { error } = await supabase.from('species').insert([{ name_ar: name }]);
            
            if (error) {
                alert("خطأ في النشر: " + error.message);
            } else {
                alert("تم النشر بنجاح!");
                document.getElementById('name').value = '';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
