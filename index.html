<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو - تجربة</title>
</head>
<body>
    <div style="padding:20px;">
        <h3>اختبار النشر:</h3>
        <input type="text" id="ar" placeholder="الاسم العربي"><br>
        <button id="btn">جرب النشر الآن</button>
    </div>

    <script>
        const URL = 'https://rmqtopxawrrgntcqqnpa.supabase.co/rest/v1/species';
        const KEY = 'Sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX';

        document.getElementById('btn').addEventListener('click', () => {
            fetch(URL, {
                method: 'POST',
                headers: {
                    'apikey': KEY,
                    'Authorization': 'Bearer ' + KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({ arabic_name: document.getElementById('ar').value })
            })
            .then(res => res.json())
            .then(data => alert("النتيجة: " + JSON.stringify(data)))
            .catch(err => alert("خطأ: " + err));
        });
    </script>
</body>
</html>
