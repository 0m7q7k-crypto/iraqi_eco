<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عراقي إيكو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #1b5e20; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; }
        .card { border: 2px solid #1b5e20; padding: 15px; margin: 10px; border-radius: 10px; background: white; width: 280px; display: inline-block; vertical-align: top; }
        input { display: block; width: 90%; margin: 5px 0; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #modal { display: none; position: fixed; top: 5%; right: 10%; width: 80%; background: white; padding: 20px; border: 3px solid #1b5e20; z-index: 100; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>عراقي إيكو</h1>
    <p>قاعدة بيانات الكائنات الحية في العراق</p>
</header>

<div class="container">
    <input type="text" id="search" class="search-box" style="width:100%; padding:12px; margin-bottom:20px;" placeholder="بحث بالاسم العربي أو اللاتيني..." onkeyup="render()">
    <button onclick="handleBtnClick()" style="padding: 10px 20px; background: #1b5e20; color: white; border: none; border-radius: 5px; cursor:pointer;">+ إضافة مخلوق</button>
    <div id="content"></div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'">✖ إغلاق</button>
    <h3>إضافة مخلوق جديد</h3>
    <input id="n_ar" placeholder="الاسم العربي (إجباري)" required>
    <input id="n_sci" placeholder="الاسم اللاتيني (إجباري)" required>
    <input id="img" placeholder="رابط الصورة (اختياري)">
    <input id="kingdom" placeholder="المملكة (اختياري)">
    <input id="phylum" placeholder="الشعبة (اختياري)">
    <input id="family" placeholder="العائلة (اختياري)">
    <input id="desc" placeholder="الوصف (اختياري)">
    <button onclick="addItem()" style="background:#1b5e20; color:white; padding:10px; width:100%; margin-top:10px;">حفظ المخلوق</button>
</div>

<script>
    const client = supabase.createClient('https://rmqtopxawrrgntcqqnpa.supabase.co', 'sb_publishable_M1Adw5Xf9Sq-aCSREHP6uQ_5Geps_QX');
    let species = [];

    async function init() {
        const { data } = await client.from('species').select('*');
        species = data || [];
        render();
    }

    async function handleBtnClick() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) {
            const email = prompt("أدخل البريد الإلكتروني:");
            const pass = prompt("أدخل كلمة المرور:");
            if (!email || !pass) return;
            const { error } = await client.auth.signInWithPassword({ email, password: pass });
            if (error) alert("خطأ: " + error.message); else alert("تم تسجيل الدخول!");
        } else {
            document.getElementById('modal').style.display = 'block';
        }
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        document.getElementById('content').innerHTML = species
            .filter(i => (i.name_ar||'').includes(q) || (i.scientific_name||'').includes(q))
            .map(item => `
                <div class="card">
                    <h3>${item.name_ar}</h3>
                    <p><i>${item.scientific_name}</i></p>
                    <p><small>المملكة: ${item.kingdom || '-'}</small></p>
                </div>
            `).join('');
    }

    async function addItem() {
        const data = {
            name_ar: document.getElementById('n_ar').value.trim(),
            scientific_name: document.getElementById('n_sci').value.trim(),
            image_url: document.getElementById('img').value,
            kingdom: document.getElementById('kingdom').value,
            phylum: document.getElementById('phylum').value,
            family: document.getElementById('family').value,
            description: document.getElementById('desc').value
        };

        if (!data.name_ar || !data.scientific_name) return alert("الاسم العربي واللاتيني إجباريان!");

        // التحقق من التكرار
        const exists = species.find(i => i.name_ar === data.name_ar || i.scientific_name === data.scientific_name);
        if (exists) return alert("موجود بالفعل في قاعدة البيانات!");

        const { error } = await client.from('species').insert([data]);
        if (error) alert("خطأ: " + error.message);
        else { alert("تمت الإضافة!"); location.reload(); }
    }

    init();
</script>
</body>
</html>
