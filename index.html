<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موسوعة كائنات العراق الحية</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .search-box { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .admin-panel { display: none; background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; border: 2px solid #3498db; }
    </style>
</head>
<body>

    <h1>كائنات العراق الحية</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث عن كائن باسمه العربي أو اللاتيني..." onkeyup="filterSpecies()">
    <button onclick="toggleAdmin()">إدارة الكائنات</button>

    <div class="admin-panel" id="adminPanel">
        <h3>إضافة كائن</h3>
        <input type="text" id="arName" placeholder="الاسم العربي"><br>
        <input type="text" id="latName" placeholder="الاسم اللاتيني"><br>
        <input type="text" id="imgUrl" placeholder="رابط الصورة"><br>
        <textarea id="desc" placeholder="الوصف"></textarea><br>
        <button onclick="saveToDatabase()">حفظ الكائن</button>
    </div>

    <div id="species-container" class="grid"></div>

    <script>
        const SUPABASE_URL = 'https://mpepdiweqeturegfzhxb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YBIUORkoL9OPbirhy5Bbbg_GUorO4_a';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allSpecies = []; // لتخزين البيانات محلياً للبحث السريع

        async function loadSpecies() {
            const { data } = await supabase.from('species').select('*');
            if (data) {
                allSpecies = data;
                renderCards(allSpecies);
            }
        }

        function renderCards(data) {
            const container = document.getElementById('species-container');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.image_url}" alt="${item.arabic_name}">
                    <h3>${item.arabic_name}</h3>
                    <p><i>${item.latin_name}</i></p>
                    <p>${item.description}</p>
                    <button onclick="deleteSpecies(${item.id})">حذف</button>
                </div>
            `).join('');
        }

        // دالة البحث المباشر
        function filterSpecies() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSpecies.filter(item => 
                item.arabic_name.toLowerCase().includes(query) || 
                item.latin_name.toLowerCase().includes(query)
            );
            renderCards(filtered);
        }

        function toggleAdmin() {
            const pass = prompt("أدخل كلمة المرور:");
            if (pass === "150") document.getElementById('adminPanel').style.display = 'block';
        }

        async function saveToDatabase() {
            const payload = {
                arabic_name: document.getElementById('arName').value,
                latin_name: document.getElementById('latName').value,
                image_url: document.getElementById('imgUrl').value,
                description: document.getElementById('desc').value
            };
            const { error } = await supabase.from('species').insert([payload]);
            if (error) alert("خطأ: " + error.message);
            else { alert("تم الحفظ!"); location.reload(); }
        }

        async function deleteSpecies(id) {
            const { error } = await supabase.from('species').delete().eq('id', id);
            if (error) alert("خطأ في الحذف");
            else location.reload();
        }

        loadSpecies();
    </script>
</body>
</html>
