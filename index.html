<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي إيكو - Iraqi Eco</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .admin-panel { margin-top: 50px; padding: 20px; background: #f4f4f4; border-radius: 10px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

    <h1>قائمة الكائنات الحية</h1>
    <div id="list">جاري تحميل البيانات...</div>

    <div id="admin-panel" class="admin-panel">
        <div id="login-area">
            <h3>تسجيل دخول المشرف للنشر:</h3>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة السر">
            <button onclick="login()">دخول للنشر</button>
        </div>
        <div id="publish-area" style="display:none;">
            <h3>إضافة كائن جديد:</h3>
            <input type="text" id="name" placeholder="اسم الكائن">
            <button onclick="publish()">نشر الكائن</button>
            <button onclick="logout()">خروج</button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://rmqtopxawrrgntcqqnpa.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcXRvcHhhd3JyZ250Y3FxbnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTIxMzQsImV4cCI6MjA5ODM2ODEzNH0.HoExHY9oNFdryWUC2u2UELLPfBNhH3P4L3zS03dvELA'
        );

        // تحميل البيانات للجميع
        async function loadData() {
            const { data } = await supabase.from('species').select('*');
            document.getElementById('list').innerHTML = data.map(i => `<div class="card"><h2>${i.name_ar}</h2></div>`).join('');
        }

        // تسجيل الدخول
        async function login() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert("خطأ: " + error.message);
            else location.reload();
        }

        // النشر
        async function publish() {
            const { error } = await supabase.from('species').insert([{ name_ar: document.getElementById('name').value }]);
            if (error) alert("خطأ: " + error.message);
            else { alert("تم النشر!"); location.reload(); }
        }

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        // التحقق من حالة الدخول عند فتح الصفحة
        window.addEventListener('load', async () => {
            loadData();
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('publish-area').style.display = 'block';
            }
        });
    </script>
</body>
</html>
